<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matchabrry.ca | Drinks Menu!</title>
    <style>
        /* Base Styling */
        body {
            font-family: Arial, Helvetica, sans-serif; /* Clean sans-serif for lists and descriptions */
            margin: 0;
            padding: 20px;
            background-color: #fff;
            color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Overall container with double border effect */
        .master-wrapper {
            max-width: 1000px;
            width: 100%;
            border: 1px solid #c9c9c9;
            box-sizing: border-box;
            background-color: #fff;
        }

        /* Header with double border bottom separator */
        .menu-header {
            border-bottom: 2px double #c9c9c9;
            text-align: center;
            padding: 30px 20px 20px;
        }

        .menu-title {
            font-family: 'Georgia', 'Times New Roman', Times, serif; /* Clean serif for titles */
            font-size: 3rem;
            font-weight: normal;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-subtitle {
            font-size: 1rem;
            color: #7a7a7a;
            margin-top: 10px;
            text-transform: none; /* Subtitle case is normal */
        }

        /* Main menu grid with internal dividers */
        .menu-body-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid #c9c9c9;
            box-sizing: border-box;
        }

        /* Left Column: Cocktails with vertical heading */
        .menu-section.cocktails {
            display: flex;
            border-right: 1px solid #c9c9c9;
            box-sizing: border-box;
        }

        .vertical-label.cocktails {
            width: 80px;
            background-color: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            border-right: 1px solid #c9c9c9;
        }

        .vertical-text {
            font-size: 1.2rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: rotate(-90deg);
            white-space: nowrap;
            color: #555;
        }

        .item-list.cocktails {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        .menu-item {
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 2px;
            border-bottom: 1px dotted transparent; /* Hidden dotted line for consistent alignment */
        }

        .menu-item:last-child { margin-bottom: 0; }

        .item-name-desc {
            flex: 1;
            margin-right: 15px;
        }

        .item-name {
            font-weight: normal;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #222;
        }

        .item-desc {
            font-size: 0.95rem;
            color: #7a7a7a;
            text-transform: lowercase; /* Corrected description to lowercase */
        }

        .item-measure {
            font-size: 1rem;
            text-transform: uppercase;
            color: #555;
            white-space: nowrap;
            align-self: end;
        }

        /* Right Column: Highballs & Mocktails Stack */
        .menu-section.right-stack {
            display: grid;
            grid-template-rows: 1fr 1fr;
            box-sizing: border-box;
        }

        /* Top-Right: Highballs Grid with horizontal heading */
        .menu-section.highballs {
            display: grid;
            grid-template-rows: auto auto; /* Two main rows: label, recommendations */
            border-bottom: 1px solid #c9c9c9;
            box-sizing: border-box;
            padding: 30px;
        }

        .highballs-label-wrapper {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .highballs-text {
            font-size: 1.2rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
        }

        .recommendations-text {
            font-family: 'Georgia', 'Times New Roman', Times, serif; /* Clean serif for titles */
            font-size: 1.5rem;
            font-weight: normal;
            text-transform: uppercase;
            color: #222;
            letter-spacing: 1px;
        }

        .highball-rows {
            display: grid;
            gap: 15px;
        }

        .highball-row {
            display: grid;
            grid-template-columns: 1fr auto 1.5fr; /* Spirit, plus sign, recommended lists */
            align-items: start;
            gap: 15px;
        }

        .spirit-name {
            font-weight: normal;
            text-transform: uppercase;
            color: #222;
            font-size: 1.05rem;
        }

        .plus-sign {
            color: #7a7a7a;
            font-size: 1.1rem;
            align-self: center;
        }

        .recommendation-list {
            font-size: 0.95rem;
            color: #7a7a7a;
            text-transform: lowercase; /* Corrected to lowercase */
            line-height: 1.4;
        }

        /* Bottom-Right: Mocktails with vertical heading */
        .menu-section.mocktails {
            display: flex;
            border-top: 1px solid #c9c9c9;
            box-sizing: border-box;
        }

        .vertical-label.mocktails {
            width: 80px;
            background-color: #f7f7f7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            border-right: 1px solid #c9c9c9;
        }

        .item-list.mocktails {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        /* Any juice/soda style */
        .footer-note {
            text-transform: uppercase;
            font-size: 1rem;
            color: #555;
            margin-top: 25px;
            padding-top: 10px;
            border-top: 1px dotted transparent;
            width: 100%;
            text-align: left;
        }

        /* Responsive Design: Stacks gracefully on mobile */
        @media (max-width: 768px) {
            .menu-title { font-size: 2.2rem; }
            .menu-subtitle { font-size: 0.9rem; }
            
            .menu-body-wrapper {
                grid-template-columns: 1fr;
                border: none;
            }

            .menu-section.cocktails,
            .menu-section.right-stack {
                grid-template-columns: 1fr;
                border: none;
            }

            .menu-section.cocktails {
                border-bottom: 1px solid #c9c9c9;
            }

            .vertical-label.cocktails,
            .vertical-label.mocktails {
                display: none; /* Hide vertical headings on mobile */
            }

            /* Main list section on mobile */
            .item-list.cocktails,
            .item-list.mocktails {
                padding: 20px 10px;
            }

            /* Responsive Highballs Grid */
            .menu-section.highballs {
                border-top: 1px solid #c9c9c9;
                border-bottom: 1px solid #c9c9c9;
                padding: 20px 10px;
            }

            .highballs-label-wrapper {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 5px;
                margin-bottom: 15px;
            }

            .highballs-text {
                font-size: 1rem;
                letter-spacing: 1px;
            }

            .recommendations-text {
                font-size: 1.2rem;
                font-weight: bold;
            }

            .highball-rows { gap: 10px; }

            .highball-row {
                grid-template-columns: 1fr; /* Stacks within each row */
                text-align: center;
                gap: 5px;
                padding: 10px;
                border-bottom: 1px dotted #e9e9e9;
            }
            .highball-row:last-child { border-bottom: none; }

            .spirit-name { font-weight: bold; font-size: 1rem; }
            .plus-sign { display: none; } /* Hide plus sign on mobile */
            .recommendation-list { font-size: 0.9rem; }
        }

    </style>
</head>

        </div>

        <div class="menu-body-wrapper">

                        <div class="item-measure">2 OUNCES</div>
                    </div>
